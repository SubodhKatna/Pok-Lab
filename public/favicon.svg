<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer circle border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#3f3f46" stroke-width="2"/>

  <!-- Top half - purple -->
  <path d="M2 32 A30 30 0 0 1 62 32 Z" fill="#7c3aed"/>

  <!-- Bottom half - white -->
  <path d="M2 32 A30 30 0 0 0 62 32 Z" fill="#e4e4e7"/>

  <!-- Divider band -->
  <rect x="2" y="30" width="60" height="4" fill="#18181b"/>

  <!-- Left pink circle (Master Ball decoration) -->
  <circle cx="14" cy="20" r="5" fill="#f9a8d4"/>
  <circle cx="14" cy="20" r="3" fill="#ec4899"/>

  <!-- Right pink circle (Master Ball decoration) -->
  <circle cx="50" cy="20" r="5" fill="#f9a8d4"/>
  <circle cx="50" cy="20" r="3" fill="#ec4899"/>

  <!-- M letter on top half -->
  <text x="32" y="27" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="13" fill="white" letter-spacing="-1">M</text>

  <!-- Center button outer -->
  <circle cx="32" cy="32" r="8" fill="#18181b"/>

  <!-- Center button ring -->
  <circle cx="32" cy="32" r="5.5" fill="#a78bfa"/>

  <!-- Center button inner -->
  <circle cx="32" cy="32" r="3" fill="#ede9fe"/>

  <!-- Center shine -->
  <circle cx="30.5" cy="30.5" r="1" fill="white" opacity="0.7"/>
</svg>
